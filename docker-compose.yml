services:
  postgres:
    image: postgres:15-alpine
    container_name: sygle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestion_academique
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d gestion_academique"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
